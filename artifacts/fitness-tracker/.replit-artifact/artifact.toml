kind = "web"
previewPath = "/"
title = "Fitness Tracker"
version = "1.0.0"
id = "artifacts/fitness-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23863

[services.development]
run = "pnpm --filter @workspace/fitness-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitness-tracker", "run", "build" ]
publicDir = "artifacts/fitness-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23863"
BASE_PATH = "/"
